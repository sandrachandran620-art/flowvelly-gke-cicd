name: Emergency On-Demand Rollback

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions dashboard
    inputs:
      environment:
        description: 'Target environment to roll back'
        required: true
        default: 'prod'
        type: choice
        options:
          - qa
          - preprod
          - prod

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_ZONE: us-central1-a

jobs:
  rollback:
    name: Execute Rollback
    runs-on: ubuntu-latest
    # Reuses the exact same environment configuration to enforce manual approval if required
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Resolve Target Cluster
        id: select-cluster
        run: |
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
            echo "cluster=prod-cluster" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.inputs.environment }}" = "preprod" ]; then
            echo "cluster=preprod-cluster" >> "$GITHUB_OUTPUT"
          else
            echo "cluster=qa-cluster" >> "$GITHUB_OUTPUT"
          fi

      - name: Get GKE Cluster Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ steps.select-cluster.outputs.cluster }}
          location: ${{ env.GKE_ZONE }}

      # Kubernetes maintains a rolling history. This rolls back the active image 
      # back to the preceding deployment active replica revision instantly.
      - name: Execute Kubernetes Rollback
        run: |
          echo "Initiating emergency rollback of deployment/inference-service in namespace: ${{ github.event.inputs.environment }}..."
          kubectl rollout undo deployment/inference-service -n ${{ github.event.inputs.environment }}
          kubectl rollout status deployment/inference-service -n ${{ github.event.inputs.environment }}
