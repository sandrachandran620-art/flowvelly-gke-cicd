name: GKE Continuous Integration & Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  GAR_REPOSITORY: flowvelly-repo
  IMAGE_NAME: inference-service
  GKE_ZONE: us-central1-a
  GKE_CLUSTER_QA: qa-cluster
  GKE_CLUSTER_PREPROD: preprod-cluster
  GKE_CLUSTER_PROD: prod-cluster

jobs:
  # ==========================================
  # STAGE 1: BUILD & PUSH CONTAINER IMAGE
  # ==========================================
  build-and-push:
    name: Build & Push Container
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.prep-tag.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Unique Tag
        id: prep-tag
        run: |
          echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push Image
        run: |
          IMAGE_URI="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}"
          docker build -t "$IMAGE_URI:${{ steps.prep-tag.outputs.tag }}" -t "$IMAGE_URI:latest" .
          docker push "$IMAGE_URI:${{ steps.prep-tag.outputs.tag }}"
          docker push "$IMAGE_URI:latest"

  # ==========================================
  # STAGE 2: CONTAINER VULNERABILITY SCANNING
  # ==========================================
  vulnerability-scan:
    name: Scan Container
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Run Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@v0.23.0
        with:
          image-ref: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

  # ==========================================
  # STAGE 3: DEPLOY TO QA (AUTOMATIC)
  # ==========================================
  deploy-qa:
    name: Deploy to QA
    needs: [build-and-push, vulnerability-scan] # Removed the iac-scan requirement!
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE Cluster Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_QA }}
          location: ${{ env.GKE_ZONE }}

      - name: Update QA Kubernetes Deployment
        run: |
          IMAGE_URI="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          kubectl create namespace qa --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f manifests/inference-service.yaml -n qa
          kubectl set image deployment/inference-service inference-service-container="$IMAGE_URI" -n qa
          kubectl rollout status deployment/inference-service -n qa

  # ==========================================
  # STAGE 4: DEPLOY TO PREPROD (APPROVAL GATE REQUIRED)
  # ==========================================
  deploy-preprod:
    name: Deploy to Pre-production
    needs: [deploy-qa, build-and-push]
    runs-on: ubuntu-latest
    environment: preprod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE Cluster Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_PREPROD }}
          location: ${{ env.GKE_ZONE }}

      - name: Update Preprod Kubernetes Deployment
        run: |
          IMAGE_URI="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          kubectl create namespace preprod --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f manifests/inference-service.yaml -n preprod
          kubectl set image deployment/inference-service inference-service-container="$IMAGE_URI" -n preprod
          kubectl rollout status deployment/inference-service -n preprod

  # ==========================================
  # STAGE 5: DEPLOY TO PRODUCTION (APPROVAL GATE REQUIRED)
  # ==========================================
  deploy-prod:
    name: Deploy to Production
    needs: [deploy-preprod, build-and-push]
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE Cluster Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_PROD }}
          location: ${{ env.GKE_ZONE }}

      - name: Update Production Kubernetes Deployment
        run: |
          IMAGE_URI="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f manifests/inference-service.yaml -n prod
          kubectl set image deployment/inference-service inference-service-container="$IMAGE_URI" -n prod
          kubectl rollout status deployment/inference-service -n prod
